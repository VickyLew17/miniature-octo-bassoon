<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <div id="cuadricula">
        <h1>Timulitos </h1>
    
    <div class = "grilla">
            <div class="juego-card" data-juego="Juego1">
            <span class="juego-nombre">Juego 1</span>
            </div>

            <div class="juego-card" data-juego="Juego2">
            <span class="juego-nombre">Juego 2</span>
            </div>

            <div class="juego-card" data-juego="Juego3">
            <span class="juego-nombre">Juego 3</span>
            </div>

            <div class="juego-card" data-juego="Juego4">
            <span class="juego-nombre">Juego 4</span>
            </div>

            <div class="juego-card" data-juego="Juego5">
            <span class="juego-nombre">Juego 5</span>

    <style>

        body{
            font-family: sans-serif;
            background-color: #e0e0e0;
        }

        h1 {
            color: rgb(0, 0, 0);
            text-align: center;
            font-size: 60px;
            font-weight: 700;
            /*-webkit-text-stroke: 5px rgb(153, 153, 153);
            paint-order: stroke fill; */
        }

        .juego-nombre {
            font-size: 24px;
        }

        .grilla {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
            align-items: center;
        }

        .juego-card {
            background-color: rgb(168, 168, 168);
            border-radius: 16px;
            padding: 60px;
            gap: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 2px solid #000000;
        }

        .juego-card:hover {
            box-shadow: 0 5px 10px rgba(107, 140, 255, 0.18);
            transform: translateY(-2px);
        }

        .juego-card:active {
            transform: translateY(0);
        }

        .BotonesInicio {
        display: flex;
        justify-content: center;
        gap: 20px;
        }

        .btn {
        display: inline-block;
        text-decoration: none;
        background-color: #a1a1a1;
        color: #000000;
        font-size: 16px;
        font-weight: 600;
        padding: 14px 35px;
        border: 2px solid #000000;
        border-radius: 50px;
        }

        .btn:hover {
            box-shadow: 0 5px 10px rgba(107, 140, 255, 0.18);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }



    </style>

</body>
</html>
