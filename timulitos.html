<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timulitos</title>
</head>

<body>
    <div id="cuadricula">
        <h1>Timulitos </h1>

            <div class="juego-card" data-juego="Juego3">

            <span class="juego-nombre">Juego 4</span>

    <style>

        body{
            font-family: sans-serif;
            background-color: #f1d1ed;
            
          
        }

        h1 {
            color: rgb(249, 252, 199);
            text-align: center;
            font-size: 60px;
            -webkit-text-stroke: 5px rgb(255, 255, 255); 
            paint-order: stroke fill;
    
        }

        .juego-nombre {
            font-size: 24px;
        }

        .grilla {
            display: grid;
            grid-template-columns: (4, 1fr);
            gap: 16px;
            align-items: center;
            display: flex;
            flex-direction: column;
        }

        .juego-card {
            background-color: rgb(192, 230, 247);
            border-radius: 16px;
            padding: 40px;
            gap: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
    </style>

</html>
