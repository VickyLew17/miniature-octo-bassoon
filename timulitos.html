<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timulitos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>

<body>

<button class="BotonInformes">

<h1 id="TituloPrincipal">Timulitos</h1>

</div>


    <div id="cuadricula">
        <h1 id="TituloJuegos">Juegos </h1>
    
    <div class = "grilla">
            <div class="juego-card" data-juego="Juego1">
            <span class="juego-nombre">Juego 1</span>
            </div>

            <div class="juego-card" data-juego="Juego2">
            <span class="juego-nombre">Juego 2</span>
            </div>

            <div class="juego-card" data-juego="Juego3">
            <span class="juego-nombre">Juego 3</span>
            </div>

            <div class="juego-card" data-juego="Juego4">
            <span class="juego-nombre">Juego 4</span>
            </div>

            <div class="juego-card" data-juego="Juego5">
            <span class="juego-nombre">Juego 5</span>
            </div>

            <div class="juego-card" data-juego="Juego6">
            <span class="juego-nombre">Juego 6</span>
            </div>

            <div class="juego-card" data-juego="Juego7">
            <span class="juego-nombre">Juego 7</span>
            </div>

            <div class="juego-card" data-juego="Juego8">
            <span class="juego-nombre">Juego 8</span>
            </div>

            <div class="juego-card" data-juego="Juego9">
            <span class="juego-nombre">Juego 9</span>
            </div>

    </div>

    <style>

        body{
            font-family: Jua;
            background-color: #fff8d8;
        }

        #TituloJuegos {
            color: rgb(0, 0, 0);
            text-align: center;
            font-size: 60px;
            font-weight: 700;
            margin-top: 10px;
        }

        .juego-nombre {
            font-size: 24px;
        }

        .grilla {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
            align-items: center;
        }

        .juego-card {
            background-color: rgb(168, 168, 168);
            border-radius: 16px;
            padding: 50px;
            gap: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 2px solid #000000;
        }

        .juego-card:hover {
            box-shadow: 0 5px 10px rgba(107, 140, 255, 0.18);
            transform: translateY(-2px);
        }

        .juego-card:active {
            transform: translateY(0);
        }

        .BotonesInicio {
        display: flex;
        justify-content: center;
        gap: 20px;
        }

        .btnInicio {
        display: inline-block;
        text-decoration: none;
        background-color: #FDE6E3;
        color: #000000;
        font-size: 16px;
        font-weight: 400;
        padding: 14px 35px;
        border: 1px solid #000000;
        border-radius: 50px;
        margin-bottom: 150px;
        }

        .btnInicio:hover {
            box-shadow: 0 5px 10px rgba(107, 140, 255, 0.18);
            transform: translateY(-2px);
        }

        .btnInicio:active {
            transform: translateY(0);
        }

        #slogan {
            font-size: 25px;
            text-align: center;
            margin-top: 0px;
            margin-bottom: 60px;
            color: #FFC1D1;
        }

        #TituloPrincipal {
            font-size:  150px;
            font-weight: 400;
            color: #FFC1D1;
            margin-top: 60px;
            margin-bottom: -10px;
            -webkit-text-stroke: 30px #e2faff;
            paint-order: stroke fill;  
            text-align: center; 
        }

       .BotonInformes {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background-color: #e2faff;
        border: 3px solid #FFC1D1;
        color: #000000; 
        display: flex;
        align-items: center;
        justify-content: center; 
        margin-left: 24px;  
        margin-top: 24px;  
        }

        .BotonInformes:hover {
            box-shadow: 0 5px 10px rgba(107, 140, 255, 0.18);
            transform: translateY(-2px);
        }

        .BotonInformes:active {
            transform: translateY(0);
        }

    </style>

</body> 
</html>
