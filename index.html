<DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xx</title>
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    /* ── PANTALLA DE INICIO ── */
    #pantalla-inicio {
      width: 100%;
      max-width: 900px;
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitulo {
      text-align: center;
      color: #555;
      margin-bottom: 36px;
      font-size: 1rem;
    }

    /* ── GRILLA ── */
    .grilla {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .juego-card {
      background: white;
      border: 2px solid #dde3f5;
      border-radius: 16px;
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .juego-card:hover {
      transform: translateY(-4px);
      border-color: #6b8cff;
      box-shadow: 0 8px 24px rgba(107, 140, 255, 0.18);
    }

    .juego-card:active {
      transform: translateY(0px);
    }

    .juego-icono {
      font-size: 2.8rem;
      line-height: 1;
    }

    .juego-nombre {
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      color: #1a1a2e;
    }

    /* ── PANTALLA DE JUEGO ── */
    #pantalla-juego {
      display: none;
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    #pantalla-juego.activa {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #nombre-juego-activo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    #area-juego {
      width: 100%;
      min-height: 400px;
      background: white;
      border: 2px solid #dde3f5;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #888;
    }

    #btn-volver {
      background: none;
      border: 2px solid #6b8cff;
      color: #6b8cff;
      padding: 10px 28px;
      border-radius: 99px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #btn-volver:hover {
      background: #6b8cff;
      color: white;
    }
  </style>
</head>
<body>

  <!-- PANTALLA DE INICIO -->
  <div id="pantalla-inicio">
    <h1>Timulitos 🎮</h1>
    <p class="subtitulo">Elegí un juego para empezar</p>

    <div class="grilla">
      <div class="juego-card" data-juego="fuegos">
        <span class="juego-icono">🎆</span>
        <span class="juego-nombre">Fuegos artificiales</span>
      </div>
      <div class="juego-card" data-juego="conejito">
        <span class="juego-icono">🐰</span>
        <span class="juego-nombre">Conejito que salta flores</span>
      </div>
      <div class="juego-card" data-juego="animales">
        <span class="juego-icono">🐮</span>
        <span class="juego-nombre">Animales que hacen ruido</span>
      </div>
      <div class="juego-card" data-juego="basket">
        <span class="juego-icono">🏀</span>
        <span class="juego-nombre">Básquet</span>
      </div>
      <div class="juego-card" data-juego="topos">
        <span class="juego-icono">🐹</span>
        <span class="juego-nombre">Topos</span>
      </div>
      <div class="juego-card" data-juego="instrumentos">
        <span class="juego-icono">🎹</span>
        <span class="juego-nombre">Instrumentos</span>
      </div>
      <div class="juego-card" data-juego="auto">
        <span class="juego-icono">🚗</span>
        <span class="juego-nombre">Auto con limpiaparabrisas</span>
      </div>
      <div class="juego-card" data-juego="arbol">
        <span class="juego-icono">🎄</span>
        <span class="juego-nombre">Árbol de navidad</span>
      </div>
      <div class="juego-card" data-juego="burbujas">
        <span class="juego-icono">🫧</span>
        <span class="juego-nombre">Burbujas</span>
      </div>
      <div class="juego-card" data-juego="pesca">
        <span class="juego-icono">🎣</span>
        <span class="juego-nombre">Pesca</span>
      </div>
      <div class="juego-card" data-juego="flor">
        <span class="juego-icono">🌸</span>
        <span class="juego-nombre">Flor que crece</span>
      </div>
    </div>
  </div>

  <!-- PANTALLA DE JUEGO -->
  <div id="pantalla-juego">
    <div id="nombre-juego-activo"></div>
    <div id="area-juego">
      <!-- Acá va el juego seleccionado -->
      <span>El juego se carga acá</span>
    </div>
    <button id="btn-volver">← Volver al inicio</button>
  </div>

  <script>
    const pantallaInicio = document.getElementById('pantalla-inicio');
    const pantallaJuego  = document.getElementById('pantalla-juego');
    const nombreJuego    = document.getElementById('nombre-juego-activo');
    const areaJuego      = document.getElementById('area-juego');
    const btnVolver      = document.getElementById('btn-volver');

    // Nombres legibles por juego
    const nombres = {
      fuegos:       'Fuegos artificiales',
      conejito:     'Conejito que salta flores',
      animales:     'Animales que hacen ruido',
      basket:       'Básquet',
      topos:        'Topos',
      instrumentos: 'Instrumentos',
      auto:         'Auto con limpiaparabrisas',
      arbol:        'Árbol de navidad',
      burbujas:     'Burbujas',
      pesca:        'Pesca',
      flor:         'Flor que crece',
    };

    // Al hacer click en una card
    document.querySelectorAll('.juego-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.juego;
        abrirJuego(id);
      });
    });

    // Volver al inicio
    btnVolver.addEventListener('click', () => {
      pantallaJuego.classList.remove('activa');
      pantallaJuego.style.display = 'none';
      pantallaInicio.style.display = 'block';
    });

    function abrirJuego(id) {
      pantallaInicio.style.display = 'none';
      pantallaJuego.style.display  = 'flex';
      pantallaJuego.classList.add('activa');
      nombreJuego.textContent = nombres[id] || id;
      areaJuego.innerHTML = `<span>Juego: ${nombres[id]} — próximamente 🚧</span>`;

      // TODO: cargar la lógica de cada juego según el id
      // cargarJuego(id);
    }

    // ── BOTONERAS ──
    // Botonera A = Espacio | Botonera B = Enter
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        manejarBoton('A');
      }
      if (e.code === 'Enter') {
        e.preventDefault();
        manejarBoton('B');
      }
    });

    function manejarBoton(jugador) {
      // Por ahora solo loguea — cuando implementes cada juego,
      // acá llamás a la función correspondiente
      console.log(`Botonera ${jugador} presionada`);
      // TODO: juegoActivo.onBoton(jugador);
    }
  </script>

</body>
</html>
